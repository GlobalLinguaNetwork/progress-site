<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3ecf8e;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .student-name {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
        }

        .period-badge {
            display: inline-block;
            background: #2d3748;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* Goal Section */
        .goal-container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .goal-header {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .achievement-stats {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .current-words {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .goal-words {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .rate-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-left: 10px;
        }

        .progress-outer {
            background: #334155;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        .progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #3ecf8e, #10b981);
            transition: width 1s ease-in-out;
        }

        /* Chart */
        .chart-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            height: 350px;
        }

        /* Details & Summary */
        details {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        summary {
            padding: 18px 24px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.3s;
        }

        summary:hover {
            background: #2a2f45;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-week {
            font-size: 1.1rem;
        }

        .summary-info {
            text-align: right;
        }

        .summary-total-words {
            color: var(--accent-color);
            font-size: 1.2rem;
            display: block;
        }

        .details-content {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 17, 23, 0.4);
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            margin-top: 20px;
        }

        .section-title:first-child { margin-top: 0; }

        /* Grid Lists */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .task-item {
            padding: 10px 15px;
            background: #252a3d;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .task-item.done {
            border-left: 3px solid var(--accent-color);
        }

        .task-item.undone {
            border-left: 3px solid #475569;
            opacity: 0.6;
        }

        .status-icon {
            margin-right: 8px;
        }

        /* Daily logs */
        .day-container {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .day-header {
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            .current-words { font-size: 2rem; }
            .task-grid { grid-template-columns: 1fr; }
            summary { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-meta" id="school-info"></div>
        <h1 class="student-name" id="student-display-name"></h1>
        <div class="period-badge" id="period-display"></div>
    </header>

    <section class="goal-container">
        <div class="goal-header">学習目標達成率</div>
        <div class="achievement-stats">
            <span class="goal-words">目標: <span id="goal-words-text"></span> 語 / </span>
            <span>現在: <span class="current-words" id="total-words-text"></span> 語</span>
            <span class="rate-text" id="rate-text"></span>
        </div>
        <div class="progress-outer">
            <div class="progress-inner" id="progress-bar"></div>
        </div>
    </section>

    <div class="chart-card">
        <canvas id="progressChart"></canvas>
    </div>

    <div id="records-container"></div>
</div>

<script>
// --- DATA START ---
var STUDENT_DATA = {
  "小野田笑海溜": {
    startDate: "2026-04-07",
    totalWords: 4800,
    achievementRate: 0.48,
    records: [
      { week: "2026-W15", weekRange: "4/6〜4/12", tasks: { "VOA": { words: 1200, count: 1, done: true }, "Science News": { words: 0, count: 0, done: false }, "TED": { words: 0, count: 0, done: false }, "ESL Lab": { words: 200, count: 1, done: true }, "Elllo": { words: 0, count: 0, done: false }, "リスニング基礎トレ": { words: 0, count: 0, done: false }, "Quizlet（指定単語帳）": { words: 700, count: 1, done: true }, "Quizlet（英熟語 Target1000）": { words: 0, count: 0, done: false }, "Quizlet（多義語）": { words: 0, count: 0, done: false }, "Quizlet（基本動詞）": { words: 0, count: 0, done: false }, "Quizlet（語法）": { words: 0, count: 0, done: false }, "Quizlet（論理マーカー）": { words: 0, count: 0, done: false }, "シス単例文付きチェックリスト": { words: 2000, count: 1, done: true }, "文法プリント": { words: 700, count: 1, done: true } }, total: 4800, dailyLogs: [{ date: "2026-04-07", logs: [{ task: "VOA", display: "VOA", words: 1200, done: true }, { task: "Science News", display: "Science News", words: 0, done: false }, { task: "TED", display: "TED", words: 0, done: false }, { task: "ESL Lab", display: "ESL Lab", words: 200, done: true }, { task: "Elllo", display: "Elllo", words: 0, done: false }, { task: "リスニング基礎トレ", display: "リスニング基礎トレ", words: 0, done: false }, { task: "Quizlet（指定単語帳）", display: "Quizlet（指定単語帳）", words: 700, done: true }, { task: "Quizlet（英熟語 Target1000）", display: "Quizlet（英熟語 Target1000）", words: 0, done: false }, { task: "Quizlet（多義語）", display: "Quizlet（多義語）", words: 0, done: false }, { task: "Quizlet（基本動詞）", display: "Quizlet（基本動詞）", words: 0, done: false }, { task: "Quizlet（語法）", display: "Quizlet（語法）", words: 0, done: false }, { task: "Quizlet（論理マーカー）", display: "Quizlet（論理マーカー）", words: 0, done: false }, { task: "シス単例文付きチェックリスト", display: "シス単例文付きチェックリスト", words: 2000, done: true }, { task: "文法プリント", display: "文法プリント（受動態）", words: 700, done: true }] }] },
    ]
  },
};

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-10';
var STUDENT_NAME = '小野田笑海溜';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};
// --- DATA END ---

function initDashboard() {
    const studentData = STUDENT_DATA[Object.keys(STUDENT_DATA)[0]];
    
    // Header
    document.getElementById('school-info').innerText = `${SCHOOL_NAME} / 担当講師: ${TEACHER_NAME}`;
    document.getElementById('student-display-name').innerText = STUDENT_NAME;
    if (FILTER_START && FILTER_END) {
        document.getElementById('period-display').innerText = `集計期間: ${FILTER_START} 〜 ${FILTER_END}`;
    }

    // Summary Stats
    document.getElementById('goal-words-text').innerText = GOAL_WORDS.toLocaleString();
    document.getElementById('total-words-text').innerText = studentData.totalWords.toLocaleString();
    document.getElementById('rate-text').innerText = `(${studentData.achievementRate}%)`;
    document.getElementById('progress-bar').style.width = Math.min(studentData.achievementRate, 100) + '%';

    // Chart
    renderChart(studentData.records);

    // Records
    renderRecords(studentData.records);
}

function renderChart(records) {
    const ctx = document.getElementById('progressChart').getContext('2d');
    const labels = records.map(r => r.weekRange);
    const taskNames = Object.keys(TASK_COLORS);

    const datasets = taskNames.map(task => ({
        label: task,
        data: records.map(r => r.tasks[task] ? r.tasks[task].words : 0),
        backgroundColor: TASK_COLORS[task],
        stack: 'Stack 0'
    }));

    new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { mode: 'index' }
            },
            scales: {
                x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { display: false } },
                y: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
            }
        }
    });
}

function renderRecords(records) {
    const container = document.getElementById('records-container');
    
    records.forEach(record => {
        const details = document.createElement('details');
        
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <div class="summary-week">
                ${record.week} 
                <span style="font-weight: normal; font-size: 0.8rem; color: var(--text-muted); margin-left: 8px;">${record.weekRange}</span>
            </div>
            <div class="summary-info">
                <span class="summary-total-words">${record.total.toLocaleString()} 語</span>
            </div>
        `;

        const content = document.createElement('div');
        content.className = 'details-content';

        // Weekly Summary
        let weeklySummaryHTML = `<div class="section-title">週間の全課題サマリー</div><div class="task-grid">`;
        Object.keys(record.tasks).forEach(taskKey => {
            const task = record.tasks[taskKey];
            weeklySummaryHTML += `
                <div class="task-item ${task.done ? 'done' : 'undone'}">
                    <span><span class="status-icon">${task.done ? '✅' : '➖'}</span>${taskKey}</span>
                    <span>${task.words.toLocaleString()} 語</span>
                </div>
            `;
        });
        weeklySummaryHTML += `</div>`;

        // Daily Logs
        let dailyLogsHTML = `<div class="section-title">日別詳細ログ</div>`;
        record.dailyLogs.forEach(day => {
            const dayTotal = day.logs.reduce((sum, log) => sum + log.words, 0);
            dailyLogsHTML += `
                <div class="day-container">
                    <div class="day-header">
                        <span>${day.date}</span>
                        <span style="color:var(--accent-color)">${dayTotal.toLocaleString()} 語</span>
                    </div>
                    <div class="task-grid">
            `;
            day.logs.forEach(log => {
                dailyLogsHTML += `
                    <div class="task-item ${log.done ? 'done' : 'undone'}">
                        <span><span class="status-icon">${log.done ? '✅' : '➖'}</span>${log.done ? log.display : log.task}</span>
                        <span style="${!log.done ? 'color:var(--text-muted)' : ''}">${log.done ? log.words.toLocaleString() + ' 語' : '0 語'}</span>
                    </div>
                `;
            });
            dailyLogsHTML += `</div></div>`;
        });

        content.innerHTML = weeklySummaryHTML + dailyLogsHTML;
        details.appendChild(summary);
        details.appendChild(content);
        container.appendChild(details);
    });
}

window.onload = initDashboard;
</script>
</body>
</html>
