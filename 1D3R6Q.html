<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --border-color: #334155;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header & Summary */
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .school-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
        }

        .period-badge {
            display: inline-block;
            background: #334155;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Goal & Progress */
        .goal-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .goal-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .goal-value {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .progress-wrapper {
            background: #334155;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            transition: width 0.5s ease-in-out;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.75rem;
            line-height: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Chart */
        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            height: 350px;
        }

        /* Weekly Logs (Details/Summary) */
        .logs-section h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        details {
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        summary {
            padding: 16px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.2s;
        }

        summary:hover {
            background: #2a2f45;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .summary-total {
            color: #2dd4bf;
            font-size: 0.9rem;
        }

        .details-content {
            padding: 0 16px 16px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        /* Tasks Grid */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }

        .task-item {
            padding: 6px 10px;
            border-radius: 4px;
            background: #2a2f45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item.done {
            border-left: 3px solid var(--task-color);
        }

        .task-item.undone {
            opacity: 0.4;
            border-left: 3px solid #64748b;
        }

        .task-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        /* Daily Logs */
        .daily-logs-container {
            margin-top: 20px;
        }

        .daily-log-card {
            background: #161a29;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .daily-date {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-color);
            border-bottom: 1px solid #334155;
            padding-bottom: 4px;
        }

        .daily-task-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .daily-task-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .daily-task-row.done {
            color: var(--text-color);
        }

        .daily-task-row.undone {
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .goal-stats {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .task-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="school-info">
            <span id="school-name"></span>

            </div>
        </div>
        <div class="progress-wrapper">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            <div class="progress-text">Achievement Rate</div>
        </div>
    </section>

    <section class="chart-container">
        <canvas id="weeklyChart"></canvas>
    </section>

    <section class="logs-section">
        <h2>学習記録（週別詳細）</h2>
        <div id="logs-accordion"></div>
    </section>
</div>

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-15';
var STUDENT_NAME = 'Hana Onishi';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

// 初期化処理
document.addEventListener('DOMContentLoaded', function() {
    const data = STUDENT_DATA[STUDENT_NAME];
    
    // ヘッダー情報セット
    document.getElementById('school-name').textContent = SCHOOL_NAME;
    document.getElementById('teacher-name').textContent = `担当: ${TEACHER_NAME}`;
    document.getElementById('student-title').textContent = `${STUDENT_NAME} 様 進捗状況`;
    document.getElementById('period-badge').textContent = `集計期間: ${FILTER_START} 〜 ${FILTER_END}`;

    // サマリー情報セット
    const totalStr = data.totalWords.toLocaleString();
    const goalStr = GOAL_WORDS.toLocaleString();
    document.getElementById('current-words').textContent = `${totalStr} 語`;
    document.getElementById('goal-words-text').textContent = goalStr;
    document.getElementById('achievement-rate-text').textContent = `${data.achievementRate}%`;
    document.getElementById('progress-bar').style.width = `${data.achievementRate}%`;

    // グラフ描画
    renderChart(data.records);

    // ログ生成
    renderLogs(data.records);
});

function renderChart(records) {
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const labels = records.map(r => r.weekRange);
    
    // 課題名のリストを取得
    const taskNames = Object.keys(TASK_COLORS);
    
    const datasets = taskNames.map(taskName => {
        return {
            label: taskName,
            data: records.map(r => r.tasks[taskName] ? r.tasks[taskName].words : 0),
            backgroundColor: TASK_COLORS[taskName],
            stack: 'Stack 0',
        };
    });

    new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

function renderLogs(records) {
    const container = document.getElementById('logs-accordion');
    
    records.forEach((record, index) => {
        const details = document.createElement('details');
        if (index === 0) details.open = true; // 最新週を開いておく

        const summary = document.createElement('summary');
        summary.innerHTML = `
            <div class="summary-left">
                <span style="color:var(--accent-color)">${record.week}</span>
                <span>${record.weekRange}</span>
            </div>
            <div class="summary-total">${record.total.toLocaleString()} 語</div>
        `;

        const content = document.createElement('div');
        content.className = 'details-content';

        // 1. 週間全課題サマリー
        const taskSummaryTitle = document.createElement('h3');
        taskSummaryTitle.style.fontSize = '1rem';
        taskSummaryTitle.style.margin = '16px 0 8px 0';
        taskSummaryTitle.textContent = '週間課題達成状況';
        content.appendChild(taskSummaryTitle);

        const taskGrid = document.createElement('div');
        taskGrid.className = 'task-grid';
        
        // 全課題をループ（TASK_COLORS基準）
        Object.keys(TASK_COLORS).forEach(taskName => {
            const taskData = record.tasks[taskName];
            const isDone = taskData && taskData.done;
            const words = taskData ? taskData.words : 0;
            
            const item = document.createElement('div');
            item.className = `task-item ${isDone ? 'done' : 'undone'}`;
            if (isDone) item.style.setProperty('--task-color', TASK_COLORS[taskName]);
            
            item.innerHTML = `
                <span class="task-name">${isDone ? '✅' : '➖'} ${taskName}</span>
                <span style="font-weight:bold">${words.toLocaleString()}</span>
            `;
            taskGrid.appendChild(item);
        });
        content.appendChild(taskGrid);

        // 2. 日別詳細ログ
        const dailyTitle = document.createElement('h3');
        dailyTitle.style.fontSize = '1rem';
        dailyTitle.style.margin = '24px 0 8px 0';
        dailyTitle.textContent = '日別実施ログ';
        content.appendChild(dailyTitle);

        const dailyContainer = document.createElement('div');
        dailyContainer.className = 'daily-logs-container';

        record.dailyLogs.forEach(day => {
            const dayCard = document.createElement('div');
            dayCard.className = 'daily-log-card';
            
            const dateHeader = document.createElement('div');
            dateHeader.className = 'daily-date';
            dateHeader.textContent = day.date;
            dayCard.appendChild(dateHeader);

            const dayTaskList = document.createElement('div');
            dayTaskList.className = 'daily-task-list';

            day.logs.forEach(log => {
                const row = document.createElement('div');
                row.className = `daily-task-row ${log.done ? 'done' : 'undone'}`;
                
                const taskDisplay = log.done ? `● ${log.display}` : `○ ${log.task}`;
                const wordDisplay = log.done ? `${log.words.toLocaleString()} 語` : '未実施';
                
                row.innerHTML = `<span>${taskDisplay}</span><span>${wordDisplay}</span>`;
                dayTaskList.appendChild(row);
            });

            dayCard.appendChild(dayTaskList);
            dailyContainer.appendChild(dayCard);
        });

        content.appendChild(dailyContainer);
        details.appendChild(summary);
        details.appendChild(content);
        container.appendChild(details);
    });
}
