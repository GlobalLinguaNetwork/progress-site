<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード - 宮﨑紗良</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-primary: #e8ecf4;
            --text-secondary: #94a3b8;
            --accent-color: #3ecf8e;
            --border-color: #334155;
            --progress-bg: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .school-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .period-info {
            font-size: 0.95rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 5px;
        }

        /* Summary Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .achievement-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .achievement-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .achievement-stats {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .achievement-stats span {
            color: var(--accent-color);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 20px;
            background-color: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3ecf8e, #10b981);
            transition: width 1s ease-in-out;
        }

        /* Chart */
        .chart-wrapper {
            height: 350px;
            margin-top: 20px;
        }

        /* Details & Summary */
        details {
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        summary {
            padding: 15px 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            transition: background 0.3s;
        }

        summary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-total {
            color: var(--accent-color);
            background: rgba(62, 207, 142, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .details-content {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text-secondary);
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        /* Task Lists */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .task-card {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
        }

        .task-done {
            border-left: 3px solid var(--accent-color);
        }

        .task-not-done {
            border-left: 3px solid #4b5563;
            color: var(--text-secondary);
        }

        /* Daily Logs */
        .daily-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .daily-day {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 12px;
        }

        .daily-date {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--accent-color);
        }

        .daily-item {
            font-size: 0.8rem;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .daily-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 600px) {
            .task-grid {
                grid-template-columns: 1fr;
            }
            .achievement-stats {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

            <div class="progress-container">

            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">週次学習ボリューム推移</div>
        <div class="chart-wrapper">
            <canvas id="stackedChart"></canvas>
        </div>
    </div>

    <div id="weekly-logs">
        <!-- JSで展開 -->
    </div>
</div>

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-14';
var STUDENT_NAME = '宮﨑紗良';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

const student = STUDENT_DATA[STUDENT_NAME];

// 1. Header & Summary Rendering
document.getElementById('main-header').innerHTML = `
    <div class="school-info">${SCHOOL_NAME} | 担当: ${TEACHER_NAME}</div>
    <h1 style="margin: 5px 0;">${STUDENT_NAME} 様 進捗ダッシュボード</h1>
    <div class="period-info">期間: ${FILTER_START} 〜 ${FILTER_END}</div>
`;

document.getElementById('stats-text').innerHTML = `
    目標: ${GOAL_WORDS.toLocaleString()} 語 / 現在: <span>${student.totalWords.toLocaleString()}</span> 語 (${student.achievementRate}%)
`;
document.getElementById('main-progress').style.width = student.achievementRate + '%';

// 2. Chart.js Implementation
const chartLabels = student.records.map(r => r.weekRange);
const datasets = Object.keys(TASK_COLORS).map(taskKey => {
    return {
        label: taskKey,
        data: student.records.map(r => r.tasks[taskKey] ? r.tasks[taskKey].words : 0),
        backgroundColor: TASK_COLORS[taskKey],
        borderRadius: 4
    };
});

new Chart(document.getElementById('stackedChart'), {
    type: 'bar',
    data: { labels: chartLabels, datasets: datasets },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 10 } }
        },
        scales: {
            x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { display: false } },
            y: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
        }
    }
});

// 3. Weekly Records Rendering (Details / Summary)
const logsContainer = document.getElementById('weekly-logs');
student.records.forEach(record => {
    const det = document.createElement('details');
    
    // Summary
    const sum = document.createElement('summary');
    sum.innerHTML = `
        <div>${record.week} <span style="font-weight:normal; color:#94a3b8; margin-left:10px;">${record.weekRange}</span></div>
        <div class="summary-total">${record.total.toLocaleString()} 語</div>
    `;
    det.appendChild(sum);

    // Content
    const content = document.createElement('div');
    content.className = 'details-content';

    // (A) Task Summary
    let summaryHtml = `<div class="section-title">週間課題サマリー</div><div class="task-grid">`;
    Object.keys(TASK_COLORS).forEach(tName => {
        const taskData = record.tasks[tName] || { words: 0, done: false };
        summaryHtml += `
            <div class="task-card ${taskData.done ? 'task-done' : 'task-not-done'}">
                <span>${taskData.done ? '✅' : '➖'} ${tName}</span>
                <span>${taskData.words.toLocaleString()} 語</span>
            </div>
        `;
    });
    summaryHtml += `</div>`;

    // (B) Daily Logs
    let dailyHtml = `<div class="section-title">日別詳細ログ</div><div class="daily-container">`;
    record.dailyLogs.forEach(day => {
        dailyHtml += `
            <div class="daily-day">
                <div class="daily-date">${day.date}</div>
        `;
        day.logs.forEach(l => {
            const style = l.done ? `color: var(--text-primary); font-weight:bold;` : `color: var(--text-secondary); opacity:0.6;`;
            dailyHtml += `
                <div class="daily-item" style="${style}">
                    <span>${l.done ? '●' : '○'} ${l.display}</span>
                    <span>${l.words.toLocaleString()} 語</span>
                </div>
            `;
        });
        dailyHtml += `</div>`;
    });
    dailyHtml += `</div>`;

    content.innerHTML = summaryHtml + dailyHtml;
    det.appendChild(content);
    logsContainer.appendChild(det);
});
