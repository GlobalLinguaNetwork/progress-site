<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --border-color: #334155;
            --success-color: #10b981;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header & Summary */
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .school-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            color: #fff;
        }

        /* Goal & Progress Bar */
        .stats-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .goal-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .goal-values {
            text-align: right;
        }

        .current-words {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success-color);
        }

        .progress-container {
            height: 16px;
            background-color: #334155;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            transition: width 1s ease-in-out;
        }

        /* Chart */
        .chart-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        /* Details & Summary Section */
        .record-section {
            margin-top: 32px;
        }

        details {
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        summary {
            padding: 16px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        summary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-total {
            background-color: var(--accent-color);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .details-content {
            padding: 0 16px 16px 16px;
            border-top: 1px solid var(--border-color);
        }

        /* Tables & Lists */
        .section-title {
            font-size: 1rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 8px;
            margin: 20px 0 12px 0;
            color: #fff;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
        }

        .task-item {
            padding: 8px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.03);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-done { border-left: 3px solid var(--success-color); color: var(--text-color); }
        .task-pending { border-left: 3px solid #64748b; color: var(--text-muted); }

        .daily-log-card {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .daily-date {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: var(--accent-color);
        }

        .daily-task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.8rem;
        }

        .daily-task-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .done-text { color: var(--text-color); font-weight: 500; }
        .undone-text { color: var(--text-muted); opacity: 0.6; }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .task-grid { grid-template-columns: 1fr; }
            .goal-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="school-info">
            <span id="school-name"></span>
            <span id="period"></span>
        </div>
        <h1 id="student-display"></h1>
        <div class="school-info">
            <span id="teacher-name"></span>
        </div>
    </header>

    <!-- Goal Section -->
    <div class="stats-card">
        <div class="goal-header">
            <div class="goal-title">目標達成状況</div>
            <div class="goal-values">
                目標: <span id="goal-words-text"></span> 語 / 
                現在: <span class="current-words" id="total-words-text"></span> 語
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div style="text-align: right; font-size: 0.9rem; font-weight: bold;">
            達成率: <span id="achievement-rate-text"></span>%
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-card">
        <canvas id="weeklyChart"></canvas>
    </div>

    <!-- Records -->
    <div class="record-section" id="records-container">
        <h2 style="font-size: 1.2rem; margin-bottom: 16px;">学習履歴詳細</h2>
        <!-- JSで挿入 -->
    </div>
</div>

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-15';
var STUDENT_NAME = '三ツ本苺花';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

// --- 2. 初期化 & UI生成 ---
document.addEventListener('DOMContentLoaded', function() {
    const data = STUDENT_DATA["みつもと まいか"];

    // 基本情報表示
    document.getElementById('school-name').textContent = SCHOOL_NAME;
    document.getElementById('teacher-name').textContent = `担当: ${TEACHER_NAME}`;
    document.getElementById('student-display').textContent = `${STUDENT_NAME} さんの学習進捗`;
    document.getElementById('period').textContent = `集計期間: ${FILTER_START} 〜 ${FILTER_END}`;

    // 目標表示
    document.getElementById('goal-words-text').textContent = GOAL_WORDS.toLocaleString();
    document.getElementById('total-words-text').textContent = data.totalWords.toLocaleString();
    document.getElementById('achievement-rate-text').textContent = data.achievementRate;
    document.getElementById('progress-bar').style.width = `${data.achievementRate}%`;

    // グラフ生成
    initChart(data.records);

    // 学習履歴生成
    renderRecords(data.records);
});

function initChart(records) {
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const labels = records.map(r => r.weekRange);
    const taskNames = Object.keys(TASK_COLORS);

    const datasets = taskNames.map(task => {
        return {
            label: task,
            data: records.map(r => r.tasks[task] ? r.tasks[task].words : 0),
            backgroundColor: TASK_COLORS[task],
            stack: 'Stack 0',
        };
    });

    new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

function renderRecords(records) {
    const container = document.getElementById('records-container');
    const taskNames = Object.keys(TASK_COLORS);

    records.forEach(weekData => {
        const details = document.createElement('details');
        
        // Summary
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <span>${weekData.week} (${weekData.weekRange})</span>
            <span class="summary-total">${weekData.total.toLocaleString()} 語</span>
        `;
        details.appendChild(summary);

        const content = document.createElement('div');
        content.className = 'details-content';

        // 1. 週間サマリー
        const summaryTitle = document.createElement('div');
        summaryTitle.className = 'section-title';
        summaryTitle.textContent = '週間タスク実施状況';
        content.appendChild(summaryTitle);

        const taskGrid = document.createElement('div');
        taskGrid.className = 'task-grid';

        taskNames.forEach(tn => {
            const taskInfo = weekData.tasks[tn];
            const item = document.createElement('div');
            const isDone = taskInfo && taskInfo.words > 0;
            item.className = `task-item ${isDone ? 'task-done' : 'task-pending'}`;
            item.innerHTML = `
                <span>${isDone ? '✅' : '➖'} ${tn}</span>
                <span>${taskInfo ? taskInfo.words.toLocaleString() : 0} 語</span>
            `;
            taskGrid.appendChild(item);
        });
        content.appendChild(taskGrid);

        // 2. 日別詳細ログ
        const dailyTitle = document.createElement('div');
        dailyTitle.className = 'section-title';
        dailyTitle.textContent = '日別詳細ログ';
        content.appendChild(dailyTitle);

        weekData.dailyLogs.forEach(day => {
            const dayCard = document.createElement('div');
            dayCard.className = 'daily-log-card';
            
            let html = `<span class="daily-date">${day.date}</span>`;
            html += `<div class="daily-task-list">`;
            
            day.logs.forEach(log => {
                const statusClass = log.done ? 'done-text' : 'undone-text';
                const displayText = log.done ? `${log.display}` : `${log.task} (未実施)`;
                html += `
                    <div class="daily-task-row ${statusClass}">
                        <span>${log.done ? '●' : '○'} ${displayText}</span>
                        <span>${log.words.toLocaleString()} 語</span>
                    </div>
                `;
            });

            html += `</div>`;
            dayCard.innerHTML = html;
            content.appendChild(dayCard);
        });

        details.appendChild(content);
        container.appendChild(details);
    });
}
</script>
