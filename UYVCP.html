<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #4f8ef7;
            --success-color: #3ecf8e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .school-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .period-info {
            font-size: 0.85rem;
            background: #2d334a;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Stats & Progress */
        .stats-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .goal-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .achievement-rate {
            font-size: 2rem;
            font-weight: 900;
            color: var(--success-color);
        }

        .progress-container {
            width: 100%;
            height: 16px;
            background-color: #334155;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3ecf8e, #7c5cfc);
            transition: width 1s ease-in-out;
        }

        .goal-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Chart */
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            height: 350px;
        }

        /* Details & Summary */
        details {
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        summary {
            padding: 16px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        summary:hover {
            background-color: #272c45;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-left {
            display: flex;
            flex-direction: column;
        }

        .summary-week-range {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .summary-total {
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .details-content {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background-color: #1a1e2e;
        }

        h3 {
            font-size: 1rem;
            margin: 15px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--accent-color);
        }

        h3:first-child { margin-top: 0; }

        /* Tables & Task Lists */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
        }

        .task-item {
            padding: 8px 12px;
            border-radius: 6px;
            background: #252a41;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-done {
            border-left: 3px solid var(--success-color);
        }

        .task-undone {
            border-left: 3px solid #475569;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .status-icon {
            margin-right: 6px;
        }

        .daily-log-card {
            background: #252a41;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .daily-date {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--accent-color);
            display: block;
        }

        .daily-tasks {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .daily-task-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 2px 0;
        }

        .text-done { color: var(--text-color); font-weight: 500; }
        .text-undone { color: var(--text-muted); font-size: 0.8rem; }

        @media (max-width: 600px) {
            .goal-header { flex-direction: column; align-items: flex-start; }
            .task-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="header-content">
            <!-- JSで動的に挿入 -->
        </div>
    </header>

    <div class="stats-card">
        <div class="goal-header">
            <div class="goal-title">多読・多聴語数目標達成状況</div>
            <div class="achievement-rate" id="achievement-rate-val">0%</div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar-el" style="width: 0%"></div>
        </div>
        <div class="goal-details">
            <span id="current-words">現在: 0 語</span>
            <span id="goal-words">目標: 1,000,000 語</span>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="weeklyChart"></canvas>
    </div>

    <div id="records-list">
        <!-- JSで <details> を生成 -->
    </div>
</div>

: false }, { task: "TED", display: "TED", words: 0, done: false }, { task: "ESL Lab", display: "ESL Lab", words: 200, done: true }, { task: "Elllo", display: "Elllo", words: 0, done: false }, { task: "リスニング基礎トレ", display: "リスニング基礎トレ", words: 0, done: false }, { task: "Quizlet（指定単語帳）", display: "Quizlet（指定単語帳）", words: 700, done: true }, { task: "Quizlet（英熟語 Target1000）", display: "Quizlet（英熟語 Target1000）", words: 0, done: false }, { task: "Quizlet（多義語）", display: "Quizlet（多義語）", words: 0, done: false }, { task: "Quizlet（基本動詞）", display: "Quizlet（基本動詞）", words: 0, done: false }, { task: "Quizlet（語法）", display: "Quizlet（語法）", words: 0, done: false }, { task: "Quizlet（論理マーカー）", display: "Quizlet（論理マーカー）", words: 0, done: false }, { task: "シス単例文付きチェックリスト", display: "シス単例文付きチェックリスト", words: 0, done: false }, { task: "文法プリント", display: "文法プリント（仮定法）", words: 700, done: true }] }] },
      { week: "2026-W16", weekRange: "4/13〜4/19", tasks: { "VOA": { words: 1200, count: 1, done: true }, "Science News": { words: 0, count: 0, done: false }, "TED": { words: 0, count: 0, done: false }, "ESL Lab": { words: 200, count: 1, done: true }, "Elllo": { words: 0, count: 0, done: false }, "リスニング基礎トレ": { words: 0, count: 0, done: false }, "Quizlet（指定単語帳）": { words: 0, count: 0, done: false }, "Quizlet（英熟語 Target1000）": { words: 0, count: 0, done: false }, "Quizlet（多義語）": { words: 0, count: 0, done: false }, "Quizlet（基本動詞）": { words: 0, count: 0, done: false }, "Quizlet（語法）": { words: 0, count: 0, done: false }, "Quizlet（論理マーカー）": { words: 0, count: 0, done: false }, "シス単例文付きチェックリスト": { words: 2000, count: 1, done: true }, "文法プリント": { words: 700, count: 1, done: true } }, total: 4100, dailyLogs: [{ date: "2026-04-13", logs: [{ task: "VOA", display: "VOA", words: 1200, done: true }, { task: "Science News", display: "Science News", words: 0, done: false }, { task: "TED", display: "TED", words: 0, done: false }, { task: "ESL Lab", display: "ESL Lab", words: 200, done: true }, { task: "Elllo", display: "Elllo", words: 0, done: false }, { task: "リスニング基礎トレ", display: "リスニング基礎トレ", words: 0, done: false }, { task: "Quizlet（指定単語帳）", display: "Quizlet（指定単語帳）", words: 0, done: false }, { task: "Quizlet（英熟語 Target1000）", display: "Quizlet（英熟語 Target1000）", words: 0, done: false }, { task: "Quizlet（多義語）", display: "Quizlet（多義語）", words: 0, done: false }, { task: "Quizlet（基本動詞）", display: "Quizlet（基本動詞）", words: 0, done: false }, { task: "Quizlet（語法）", display: "Quizlet（語法）", words: 0, done: false }, { task: "Quizlet（論理マーカー）", display: "Quizlet（論理マーカー）", words: 0, done: false }, { task: "シス単例文付きチェックリスト", display: "シス単例文付きチェックリスト", words: 2000, done: true }, { task: "文法プリント", display: "文法プリント（仮定法）", words: 700, done: true }] }] },

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-14';
var STUDENT_NAME = '山本唯菜';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

// --- 初期化処理 ---
document.addEventListener('DOMContentLoaded', () => {
    const student = STUDENT_DATA[STUDENT_NAME];
    
    // ヘッダー反映
    const headerEl = document.getElementById('header-content');
    headerEl.innerHTML = `
        <div class="school-info">${SCHOOL_NAME} / 担当: ${TEACHER_NAME}</div>
        <h1>${STUDENT_NAME} さんの学習進捗</h1>
        <div class="period-info">集計期間: ${FILTER_START} 〜 ${FILTER_END}</div>
    `;

    // サマリー反映
    const currentWordsEl = document.getElementById('current-words');
    const goalWordsEl = document.getElementById('goal-words');
    const achievementRateEl = document.getElementById('achievement-rate-val');
    const progressBarEl = document.getElementById('progress-bar-el');

    currentWordsEl.textContent = `現在: ${student.totalWords.toLocaleString()} 語`;
    goalWordsEl.textContent = `目標: ${GOAL_WORDS.toLocaleString()} 語`;
    achievementRateEl.textContent = `${student.achievementRate}%`;
    progressBarEl.style.width = `${Math.min(student.achievementRate, 100)}%`;

    // チャート描画
    initChart(student.records);

    // リスト描画
    renderRecords(student.records);
});

function initChart(records) {
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const labels = records.map(r => r.weekRange);
    
    // タスク名の一覧を取得
    const taskNames = Object.keys(TASK_COLORS);
    
    const datasets = taskNames.map(taskName => {
        return {
            label: taskName,
            data: records.map(r => r.tasks[taskName] ? r.tasks[taskName].words : 0),
            backgroundColor: TASK_COLORS[taskName],
            borderRadius: 4
        };
    });

    new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }, // 数が多いので凡例は非表示
                tooltip: { mode: 'index' }
            },
            scales: {
                x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

function renderRecords(records) {
    const container = document.getElementById('records-list');
    
    records.forEach(record => {
        const details = document.createElement('details');
        
        // --- summary 部分 ---
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <div class="summary-left">
                <span class="summary-week">${record.week}</span>
                <span class="summary-week-range">${record.weekRange}</span>
            </div>
            <div class="summary-total">${record.total.toLocaleString()} 語</div>
        `;
        
        // --- 内容部分 ---
        const content = document.createElement('div');
        content.className = 'details-content';

        // 1. 週間サマリー
        let tasksHtml = '<h3>週間の全課題サマリー</h3><div class="task-grid">';
        Object.keys(record.tasks).forEach(taskKey => {
            const task = record.tasks[taskKey];
            const statusClass = task.done ? 'task-done' : 'task-undone';
            const icon = task.done ? '✅' : '➖';
            tasksHtml += `
                <div class="task-item ${statusClass}">
                    <span><span class="status-icon">${icon}</span>${taskKey}</span>
                    <span>${task.words.toLocaleString()}</span>
                </div>
            `;
        });
        tasksHtml += '</div>';

        // 2. 日別ログ
        let logsHtml = '<h3>日別詳細ログ</h3>';
        record.dailyLogs.forEach(day => {
            logsHtml += `
                <div class="daily-log-card">
                    <span class="daily-date">${day.date}</span>
                    <div class="daily-tasks">
            `;
            day.logs.forEach(log => {
                const textClass = log.done ? 'text-done' : 'text-undone';
                const statusStr = log.done ? `<strong>${log.display}</strong>: ${log.words.toLocaleString()}語` : `${log.task}: 未実施`;
                logsHtml += `<div class="daily-task-row ${textClass}">${statusStr}</div>`;
            });
            logsHtml += `</div></div>`;
        });

        content.innerHTML = tasksHtml + logsHtml;
        details.appendChild(summary);
        details.appendChild(content);
        container.appendChild(details);
    });
}
</script>

</body>
</html>
