<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3ecf8e;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header & Summary */
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .school-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .period-info {
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Progress Card */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .goal-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .goal-title {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .goal-stats {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .current-words {
            color: var(--accent-color);
        }

        .progress-wrapper {
            background-color: #334155;
            border-radius: 999px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3ecf8e, #3b82f6);
            height: 100%;
            transition: width 1s ease-in-out;
        }

        /* Chart Section */
        .chart-container {
            height: 400px;
            position: relative;
        }

        /* Details / Summary */
        details {
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        summary {
            padding: 16px;
            cursor: pointer;
            font-weight: bold;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        summary:hover {
            background-color: #2d3450;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-total {
            color: var(--accent-color);
            font-size: 0.9rem;
            background: rgba(62, 207, 142, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .details-content {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: rgba(15, 17, 23, 0.3);
        }

        h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Task Tables/Lists */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }

        .task-item {
            font-size: 0.85rem;
            padding: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-done {
            border-left: 3px solid var(--accent-color);
        }

        .task-undone {
            border-left: 3px solid #64748b;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .daily-log-container {
            margin-top: 16px;
        }

        .daily-day-card {
            margin-bottom: 16px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .daily-date {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .daily-task-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status-icon {
            margin-right: 6px;
        }

        @media (max-width: 600px) {
            .task-grid {
                grid-template-columns: 1fr;
            }
            .goal-stats {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header id="header-info"></header>

</div>

  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

document.addEventListener('DOMContentLoaded', function() {
    const data = STUDENT_DATA[STUDENT_NAME];

    // 1. Header Information
    const headerEl = document.getElementById('header-info');
    headerEl.innerHTML = `
        <div class="school-info">${SCHOOL_NAME} / 担当：${TEACHER_NAME}</div>
        <h1 style="margin-bottom: 8px;">${STUDENT_NAME} さんの進捗</h1>
        <div class="period-info">集計期間: ${FILTER_START} 〜 ${FILTER_END}</div>
    `;

    // 2. Goal and Rate
    const goalStatsEl = document.getElementById('goal-stats-text');
    goalStatsEl.innerHTML = `
        目標: ${GOAL_WORDS.toLocaleString()} 語 / 
        現在: <span class="current-words">${data.totalWords.toLocaleString()}</span> 語 
        (${data.achievementRate}%)
    `;
    const progressBar = document.getElementById('main-progress-bar');
    progressBar.style.width = data.achievementRate + '%';

    // 3. Stacked Bar Chart
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const labels = data.records.map(r => r.weekRange);
    const taskNames = Object.keys(TASK_COLORS);
    
    const datasets = taskNames.map(task => {
        return {
            label: task,
            data: data.records.map(r => r.tasks[task] ? r.tasks[task].words : 0),
            backgroundColor: TASK_COLORS[task],
            stack: 'Stack 0',
        };
    });

    new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, position: 'bottom', labels: { color: '#e8ecf4', boxWidth: 12, font: { size: 10 } } }
            },
            scales: {
                x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { display: false } },
                y: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
            }
        }
    });

    // 4. Detailed Logs (Details/Summary)
    const logsContainer = document.getElementById('logs-container');
    
    data.records.forEach(record => {
        const details = document.createElement('details');
        
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <span>${record.week} (${record.weekRange})</span>
            <span class="summary-total">${record.total.toLocaleString()} 語</span>
        `;
        
        const content = document.createElement('div');
        content.className = 'details-content';

        // Weekly Summary
        let weeklySummaryHtml = `<h3>週間の全課題サマリー</h3><div class="task-grid">`;
        Object.keys(record.tasks).forEach(taskName => {
            const t = record.tasks[taskName];
            const statusClass = t.done ? 'task-done' : 'task-undone';
            const icon = t.done ? '✅' : '➖';
            weeklySummaryHtml += `
                <div class="task-item ${statusClass}">
                    <span>${icon} ${taskName}</span>
                    <span>${t.words.toLocaleString()} 語</span>
                </div>
            `;
        });
        weeklySummaryHtml += `</div>`;

        // Daily Logs
        let dailyLogsHtml = `<div class="daily-log-container"><h3>日別詳細ログ</h3>`;
        record.dailyLogs.forEach(day => {
            dailyLogsHtml += `<div class="daily-day-card">
                <span class="daily-date">${day.date}</span>
                <div class="daily-task-list">`;
            day.logs.forEach(log => {
                const isDone = log.done;
                const textStyle = isDone ? 'color: #e8ecf4; font-weight: bold;' : 'color: #64748b; font-weight: normal;';
                const wordsText = isDone ? `${log.words.toLocaleString()} 語` : '未実施';
                const icon = isDone ? '●' : '○';
                dailyLogsHtml += `
                    <div style="font-size: 0.85rem; display: flex; justify-content: space-between; ${textStyle}">
                        <span><span class="status-icon" style="color:${isDone ? TASK_COLORS[log.task] : '#444'}">${icon}</span>${log.display}</span>
                        <span>${wordsText}</span>
                    </div>
                `;
            });
            dailyLogsHtml += `</div></div>`;
        });
        dailyLogsHtml += `</div>`;

        content.innerHTML = weeklySummaryHtml + dailyLogsHtml;
        details.appendChild(summary);
        details.appendChild(content);
        logsContainer.appendChild(details);
    });
});
</script>

</body>
</html>
