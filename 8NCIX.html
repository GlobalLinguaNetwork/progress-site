<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3ecf8e;
            --border-color: #334155;
            --done-color: #3ecf8e;
            --undone-color: #64748b;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ヘッダー・サマリー */
        header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .info-top {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .student-name {
            font-size: 2rem;
            font-weight: bold;
            margin: 0 0 20px 0;
        }

        /* 進捗セクション */
        .progress-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .goal-text {
            font-size: 1.1rem;
        }

        .total-words {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .rate-badge {
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(62, 207, 142, 0.1);
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
        }

        .progress-container {
            width: 100%;
            height: 14px;
            background: #334155;
            border-radius: 7px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3ecf8e, #10b981);
            transition: width 1s ease-in-out;
        }

        /* グラフ */
        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            height: 350px;
        }

        /* 学習記録 (details/summary) */
        .record-item {
            margin-bottom: 15px;
        }

        details {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        summary {
            padding: 15px 20px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.2s;
        }

        summary:hover {
            background: #252b45;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .summary-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .week-tag {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .details-content {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 17, 23, 0.4);
        }

        /* 週間サマリー課題リスト */
        .task-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .task-card {
            padding: 10px 15px;
            border-radius: 6px;
            background: #252b45;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-card.done { border-left: 3px solid var(--done-color); color: var(--text-color); }
        .task-card.undone { border-left: 3px solid #4b5563; color: var(--text-muted); opacity: 0.6; }

        /* 日別ログ */
        .daily-section-title {
            font-size: 1rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin: 20px 0 15px;
        }

        .daily-row {
            background: #161b2c;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .daily-date {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: var(--accent-color);
        }

        .daily-task-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .daily-task-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #252b45;
        }

        .daily-task-badge.done {
            background: #064e3b;
            color: #d1fae5;
            border: 1px solid #059669;
        }

        .daily-task-badge.undone {
            color: #64748b;
            border: 1px solid #334155;
        }

        @media (max-width: 600px) {
            .goal-stats { flex-direction: column; align-items: flex-start; gap: 10px; }
            .summary-left { flex-direction: column; align-items: flex-start; gap: 5px; }
            .chart-card { height: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="info-top" id="header-info"></div>
        <h1 class="student-name" id="student-name"></h1>
        <div class="info-top" id="filter-info"></div>
    </header>

    <div class="progress-section">
        <div class="goal-stats">
            <div class="goal-text">
                <span style="color:var(--text-muted)">目標: 1,000,000 語 / <span id="goal-date"></span> まで</span><br>
                現在: <span class="total-words" id="total-words">0</span> 語
            </div>
            <div class="rate-badge" id="achievement-rate">0%</div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <div class="chart-card">
        <canvas id="weeklyChart"></canvas>
    </div>

    <h2 style="font-size: 1.4rem; margin: 40px 0 20px;">週別・日別 詳細ログ</h2>
    <div id="records-container"></div>
</div>

    const studentKey = STUDENT_DATA[STUDENT_NAME] ? STUDENT_NAME : "Matsui Mina";
    const data = STUDENT_DATA[studentKey];

    // サマリー情報の表示
    document.getElementById('header-info').textContent = `${SCHOOL_NAME} / 担当: ${TEACHER_NAME}`;
    document.getElementById('student-name').textContent = `${STUDENT_NAME} 様`;

    document.getElementById('total-words').textContent = data.totalWords.toLocaleString();
    document.getElementById('achievement-rate').textContent = `${data.achievementRate}%`;
    document.getElementById('progress-bar').style.width = `${Math.min(data.achievementRate, 100)}%`;

    // グラフ描画
    const labels = data.records.map(r => r.weekRange);
    const datasets = Object.keys(TASK_COLORS).map(taskName => ({
        label: taskName,
        data: data.records.map(r => r.tasks[taskName]?.words || 0),
        backgroundColor: TASK_COLORS[taskName],
        stack: 'Stack 0'
    }));

    new Chart(document.getElementById('weeklyChart'), {
        type: 'bar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });

    // レコード描画
    const container = document.getElementById('records-container');
    data.records.forEach(record => {
        const details = document.createElement('details');
        
        // summary部分
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <div class="summary-left">
                <span class="week-tag">${record.week}</span>
                <span>${record.weekRange}</span>
            </div>
            <span style="color: var(--accent-color)">${record.total.toLocaleString()} 語</span>
        `;
        
        const content = document.createElement('div');
        content.className = 'details-content';

        // 1. 週間サマリー
        const summaryTitle = document.createElement('div');
        summaryTitle.className = 'daily-section-title';
        summaryTitle.textContent = '週間課題達成状況';
        content.appendChild(summaryTitle);

        const taskGrid = document.createElement('div');
        taskGrid.className = 'task-summary-grid';
        Object.entries(record.tasks).forEach(([name, info]) => {
            const card = document.createElement('div');
            card.className = `task-card ${info.done ? 'done' : 'undone'}`;
            card.innerHTML = `
                <span>${info.done ? '✅' : '➖'} ${name}</span>
                <span>${info.words.toLocaleString()} 語</span>
            `;
            taskGrid.appendChild(card);
        });
        content.appendChild(taskGrid);

        // 2. 日別詳細ログ
        const dailyTitle = document.createElement('div');
        dailyTitle.className = 'daily-section-title';
        dailyTitle.textContent = '日別詳細ログ';
        content.appendChild(dailyTitle);

        record.dailyLogs.forEach(day => {
            const row = document.createElement('div');
            row.className = 'daily-row';
            row.innerHTML = `<span class="daily-date">${day.date}</span>`;
            
            const badgeList = document.createElement('div');
            badgeList.className = 'daily-task-list';
            
            day.logs.forEach(log => {
                const badge = document.createElement('span');
                badge.className = `daily-task-badge ${log.done ? 'done' : 'undone'}`;
                badge.innerHTML = log.done ? `<strong>${log.display}</strong>: ${log.words}語` : `${log.task}: 未`;
                badgeList.appendChild(badge);
            });
            
            row.appendChild(badgeList);
            content.appendChild(row);
        });

        details.appendChild(summary);
        details.appendChild(content);
        container.appendChild(details);
    });
});
</script>
</body>
</html>
