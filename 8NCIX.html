<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多読・多聴 進捗ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1e2235;
            --text-color: #e8ecf4;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --success-color: #3ecf8e;
            --border-color: #334155;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Header */
        header { margin-bottom: 24px; }
        .school-info { display: flex; justify-content: space-between; flex-wrap: wrap; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
        h1 { margin: 0; font-size: 1.6rem; color: #fff; }
        .period-badge { display: inline-block; background: var(--accent-color); color: #fff; padding: 2px 12px; border-radius: 4px; font-size: 0.85rem; margin-top: 8px; }

        /* Goal & Progress Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .goal-stats { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .goal-label { font-size: 0.9rem; color: var(--text-muted); }
        .goal-value { font-size: 1.3rem; font-weight: bold; }
        .achievement-rate { font-size: 2.2rem; color: var(--success-color); font-weight: bold; line-height: 1; }

        .progress-container { background: #334155; border-radius: 10px; height: 16px; width: 100%; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #3ecf8e); transition: width 1s ease-in-out; }

        /* Chart */
        .chart-container { height: 300px; width: 100%; }

        /* Logs Section */
        h2 { font-size: 1.3rem; margin: 32px 0 16px; border-left: 4px solid var(--accent-color); padding-left: 12px; }
        
        details { background: var(--card-bg); border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        summary {
            padding: 16px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.2s;
        }
        summary:hover { background: #262b45; }
        summary::-webkit-details-marker { display: none; }
        .summary-left { display: flex; gap: 12px; align-items: center; }
        .summary-total { color: var(--success-color); background: rgba(62, 207, 142, 0.1); padding: 2px 10px; border-radius: 4px; font-size: 0.9rem; }

        .details-content { padding: 20px; border-top: 1px solid var(--border-color); background: rgba(15, 17, 23, 0.3); }

        /* Task Summary List */
        .section-title { font-size: 1rem; margin-bottom: 12px; color: var(--accent-color); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .task-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }
        .task-item {
            padding: 8px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        .task-item.done { border-left: 3px solid var(--task-color); color: var(--text-color); }
        .task-item.undone { border-left: 3px solid #4b5563; color: var(--text-muted); opacity: 0.6; }

        /* Daily Logs */
        .daily-log-card { margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .daily-log-card:last-child { border-bottom: none; margin-bottom: 0; }
        .daily-date { font-weight: bold; margin-bottom: 8px; display: block; font-size: 0.9rem; color: #fff; }
        .daily-tasks { display: flex; flex-direction: column; gap: 4px; }
        .daily-task-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .daily-task-row.done { color: var(--text-color); }
        .daily-task-row.undone { color: var(--text-muted); font-size: 0.75rem; }

        @media (max-width: 600px) {
            .goal-stats { flex-direction: column; align-items: flex-start; }
            .achievement-rate { font-size: 1.8rem; }
            .task-summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container">
    <header>

        <div class="progress-container">

    </section>

var GOAL_WORDS = 1000000;
var GOAL_DATE  = '2027-01-15';
var SCHOOL_NAME  = '個別教室のトライ 福井駅前本校';
var TEACHER_NAME = '若林　卓生';
var FILTER_START = '2026-03-30';
var FILTER_END   = '2026-04-15';
var STUDENT_NAME = '松井美奈';
var TASK_COLORS = {
  "VOA": "#3ecf8e",
  "Science News": "#f7a44f",
  "TED": "#f75f7a",
  "ESL Lab": "#e879f9",
  "Elllo": "#a78bfa",
  "リスニング基礎トレ": "#fbbf24",
  "Quizlet（指定単語帳）": "#34d399",
  "Quizlet（英熟語 Target1000）": "#10b981",
  "Quizlet（多義語）": "#059669",
  "Quizlet（基本動詞）": "#047857",
  "Quizlet（語法）": "#065f46",
  "Quizlet（論理マーカー）": "#064e3b",
  "シス単例文付きチェックリスト": "#4f8ef7",
  "文法プリント": "#7c5cfc"
};

// --- Initialization ---

document.addEventListener('DOMContentLoaded', () => {
    // データ取得 (キーが Matsui Mina であることを考慮)
    const data = STUDENT_DATA["Matsui Mina"] || STUDENT_DATA[STUDENT_NAME];

    // Header & Summary info
    document.getElementById('school-name').textContent = SCHOOL_NAME;
    document.getElementById('teacher-name').textContent = `担当: ${TEACHER_NAME}`;
    document.getElementById('student-name-display').textContent = `${STUDENT_NAME} 様 進捗状況`;
    document.getElementById('period-badge').textContent = `${FILTER_START} 〜 ${FILTER_END}`;
    document.getElementById('total-words').textContent = data.totalWords.toLocaleString();
    document.getElementById('achievement-rate').textContent = `${data.achievementRate}%`;
    document.getElementById('progress-bar').style.width = `${data.achievementRate}%`;

    // Chart.js Stacked Bar Chart
    const ctx = document.getElementById('stackedBarChart').getContext('2d');
    const chartLabels = data.records.map(r => r.weekRange);
    const taskKeys = Object.keys(TASK_COLORS);
    
    const datasets = taskKeys.map(key => ({
        label: key,
        data: data.records.map(r => r.tasks[key] ? r.tasks[key].words : 0),
        backgroundColor: TASK_COLORS[key],
        stack: 'Stack 0',
    }));

    new Chart(ctx, {
        type: 'bar',
        data: { labels: chartLabels, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });

    // Weekly Records via <details> & <summary>
    const container = document.getElementById('records-container');
    const taskList = Object.keys(TASK_COLORS);

    data.records.forEach((record, idx) => {
        const details = document.createElement('details');
        if (idx === data.records.length - 1) details.open = true; // 最新週を開く

        const summary = document.createElement('summary');
        summary.innerHTML = `
            <div class="summary-left">
                <span style="color:var(--accent-color)">${record.week}</span>
                <span>${record.weekRange}</span>
            </div>
            <div class="summary-total">${record.total.toLocaleString()} 語</div>
        `;

        const content = document.createElement('div');
        content.className = 'details-content';

        // 1. Weekly Task Summary
        const summaryTitle = document.createElement('div');
        summaryTitle.className = 'section-title';
        summaryTitle.textContent = '週間課題達成状況';
        content.appendChild(summaryTitle);

        const grid = document.createElement('div');
        grid.className = 'task-summary-grid';
        taskList.forEach(taskName => {
            const taskData = record.tasks[taskName];
            const isDone = taskData && taskData.done;
            const item = document.createElement('div');
            item.className = `task-item ${isDone ? 'done' : 'undone'}`;
            if (isDone) item.style.setProperty('--task-color', TASK_COLORS[taskName]);
            
            item.innerHTML = `
                <span>${isDone ? '✅' : '➖'} ${taskName}</span>
                <span style="font-weight:bold">${(taskData ? taskData.words : 0).toLocaleString()}</span>
            `;
            grid.appendChild(item);
        });
        content.appendChild(grid);

        // 2. Daily Detailed Logs
        const dailyTitle = document.createElement('div');
        dailyTitle.className = 'section-title';
        dailyTitle.textContent = '日別学習ログ';
        content.appendChild(dailyTitle);

        record.dailyLogs.forEach(day => {
            const dayCard = document.createElement('div');
            dayCard.className = 'daily-log-card';
            
            const dateSpan = document.createElement('span');
            dateSpan.className = 'daily-date';
            dateSpan.textContent = day.date;
            dayCard.appendChild(dateSpan);

            const taskContainer = document.createElement('div');
            taskContainer.className = 'daily-tasks';

            day.logs.forEach(log => {
                const row = document.createElement('div');
                row.className = `daily-task-row ${log.done ? 'done' : 'undone'}`;
                
                const label = log.done ? `● ${log.display}` : `○ ${log.task}`;
                const value = log.done ? `${log.words.toLocaleString()} 語` : `未実施`;
                
                row.innerHTML = `<span>${label}</span><span>${value}</span>`;
                taskContainer.appendChild(row);
            });

            dayCard.appendChild(taskContainer);
            content.appendChild(dayCard);
        });

        details.appendChild(summary);
        details.appendChild(content);
        container.appendChild(details);
    });
});
</script>
